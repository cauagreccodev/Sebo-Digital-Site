server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: sebodigital-api
  datasource:
    url: "${DB_URL:jdbc:h2:file:./data/sebodigital;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}"
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}

app:
  security:
    jwt-secret: ${JWT_SECRET:sebo-digital-dev-secret-key-change-in-production-123456}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}

logging:
  level:
    root: INFO
    org.hibernate.SQL: INFO
    org.springframework: INFO
