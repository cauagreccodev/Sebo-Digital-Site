spring:
  datasource:
    url: "${DB_TEST_URL:${DB_URL:jdbc:postgresql://localhost:5432/sebodigital}}"
    username: "${DB_TEST_USERNAME:${DB_USERNAME:postgres}}"
    password: "${DB_TEST_PASSWORD:${DB_PASSWORD:postgres}}"
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

app:
  demo:
    enabled: false
  security:
    jwt-secret: sebo-digital-test-secret-key-change-in-production-123456
    jwt-expiration-minutes: 120

logging:
  level:
    root: INFO
    org.hibernate.SQL: INFO
    org.springframework: INFO
